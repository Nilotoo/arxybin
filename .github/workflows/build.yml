name: Build arxybin

# Trigger: push to main, or manual trigger from GitHub web UI
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # =========================================================================
  # macOS build — VST3 + AudioUnit + Standalone
  # =========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.13
        run: |
          git clone --depth 1 --branch 8.0.13 \
            https://github.com/juce-framework/JUCE.git ~/JUCE

      - name: Configure CMake
        run: |
          cmake -G Xcode -B build_mac

      - name: Build Release
        run: |
          cmake --build build_mac --config Release

      - name: Create macOS installer (.pkg)
        run: |
          # Create staging directories
          mkdir -p pkg_root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_root/Library/Audio/Plug-Ins/Components
          mkdir -p pkg_root/Applications

          # Copy plugin files into staging (skip if not built)
          [ -d build_mac/arxybin_artefacts/Release/VST3/arxybin..vst3 ] && \
            cp -R build_mac/arxybin_artefacts/Release/VST3/arxybin..vst3 \
              pkg_root/Library/Audio/Plug-Ins/VST3/ || echo "VST3 not found, skipping"
          [ -d build_mac/arxybin_artefacts/Release/AU/arxybin..component ] && \
            cp -R build_mac/arxybin_artefacts/Release/AU/arxybin..component \
              pkg_root/Library/Audio/Plug-Ins/Components/ || echo "AU not found, skipping"
          [ -d build_mac/arxybin_artefacts/Release/Standalone/arxybin..app ] && \
            cp -R build_mac/arxybin_artefacts/Release/Standalone/arxybin..app \
              pkg_root/Applications/ || echo "Standalone not found, skipping"

          # Build the installer package
          pkgbuild \
            --root pkg_root \
            --identifier com.nilotoo.arxybin \
            --version 1.0.0 \
            --install-location / \
            arxybin_v1.0.0_macOS.pkg

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arxybin-macOS
          path: |
            build_mac/arxybin_artefacts/Release/VST3/arxybin..vst3
            build_mac/arxybin_artefacts/Release/AU/arxybin..component
            build_mac/arxybin_artefacts/Release/Standalone/arxybin..app
            arxybin_v1.0.0_macOS.pkg

  # =========================================================================
  # Windows build — VST3 + Standalone + Inno Setup installer
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.13
        shell: pwsh
        run: |
          git clone --depth 1 --branch 8.0.13 `
            https://github.com/juce-framework/JUCE.git $env:USERPROFILE\JUCE

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build_win -A x64 -DJUCE_PATH="$env:USERPROFILE\JUCE"

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build_win --config Release

      - name: Prepare installer staging
        shell: cmd
        run: |
          mkdir release\arxybin_v1.0.0\arxybin..vst3 2>nul
          xcopy /E /Y build_win\arxybin_artefacts\Release\VST3\arxybin..vst3\* release\arxybin_v1.0.0\arxybin..vst3\
          copy /Y build_win\arxybin_artefacts\Release\Standalone\arxybin..exe release\arxybin_v1.0.0\
          copy /Y presets\factory\*.arxybin release\arxybin_v1.0.0\

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Create Windows installer (Inno Setup)
        shell: pwsh
        run: |
          iscc release\setup.iss

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arxybin-Windows
          path: |
            build_win/arxybin_artefacts/Release/VST3/arxybin..vst3
            build_win/arxybin_artefacts/Release/Standalone/arxybin..exe
            release/arxybin_v*_Setup.exe

  # =========================================================================
  # Linux build — VST3 + Standalone
  # =========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JUCE Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libgtk-4-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Verify GTK installation
        run: |
          echo "=== GTK3 ===" && pkg-config --cflags --libs gtk+-3.0 2>&1 || echo "GTK3 not found"
          echo "=== GTK4 ===" && pkg-config --cflags --libs gtk4 2>&1 || echo "GTK4 not found"

      - name: Clone JUCE 8.0.13
        run: |
          git clone --depth 1 --branch 8.0.13 \
            https://github.com/juce-framework/JUCE.git ~/JUCE

      - name: Configure CMake
        run: |
          cmake -B build_linux -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="$(pkg-config --cflags gtk+-3.0 webkit2gtk-4.1)" \
            -DCMAKE_EXE_LINKER_FLAGS="$(pkg-config --libs gtk+-3.0 webkit2gtk-4.1)" \
            -DCMAKE_SHARED_LINKER_FLAGS="$(pkg-config --libs gtk+-3.0 webkit2gtk-4.1)"

      - name: Build Release
        run: |
          cmake --build build_linux --config Release

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arxybin-Linux
          path: |
            build_linux/arxybin_artefacts/Release/VST3/arxybin..vst3
            build_linux/arxybin_artefacts/Release/Standalone/arxybin
